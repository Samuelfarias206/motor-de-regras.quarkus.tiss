# ============================================================================
# Datasource — H2 embarcado em memória
# Não precisa de Docker nem de banco externo.
# Os dados existem apenas enquanto a aplicação estiver rodando.
# ============================================================================
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:default

# Hibernate recria as tabelas a cada reinício (drop-and-create).
quarkus.hibernate-orm.database.generation=drop-and-create

# Log SQL gerado pelo Hibernate (útil para debug, desative em produção)
quarkus.hibernate-orm.log.sql=true

# ============================================================================
# Console web do H2 — acessível em http://localhost:8080/h2
# Permite visualizar tabelas, executar SQL e inspecionar dados.
# ============================================================================
quarkus.datasource.devservices.enabled=true
quarkus.dev-ui.cors.enabled=true

# ============================================================================
# Otimizacao Hibernate / JPA
# ============================================================================
# Habilita o envio em lote (batching) dos inserts no banco para evitar gargalos na rede
# Insere as guias do lote com muito mais eficiência
quarkus.hibernate-orm.jdbc.statement-batch-size=50
